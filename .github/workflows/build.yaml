# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: "Build"
permissions:
  actions: write
  checks: write
  contents: write

on:
  push:
    branches: [master]
  pull_request_target:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    outputs:
      version: ${{ steps.vsix_version.outputs.version-number }}
    name: Build
    runs-on: windows-latest
    env:
      Configuration: Release
      DeployExtension: False
      VsixManifestPath: src\source.extension.vsixmanifest
      VsixManifestSourcePath: src\source.extension.cs

    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
        persist-credentials: false

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.slnx', '**/*.sln', '**/*.csproj', '**/packages.config', '**/packages.lock.json', '**/nuget.config') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Increment VSIX version
      id: vsix_version
      uses: timheuer/vsix-version-stamp@v2
      with:
        manifest-file: ${{ env.VsixManifestPath }}
        vsix-token-source-file: ${{ env.VsixManifestSourcePath }}

    - name: Build
      run: msbuild /v:m -restore /p:OutDir=\_built

    - name: Run tests
      run: dotnet vstest /_built/StartScreen.Test.dll --logger "trx;LogFileName=test-results.trx"

    - name: Report test results
      uses: dorny/test-reporter@v3
      if: ${{ always() && (github.event_name != 'pull_request_target' || github.event.pull_request.head.repo.full_name == github.repository) }}
      with:
        name: Test Results
        path: '**/test-results.trx'
        reporter: dotnet-trx

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ github.event.repository.name }}.vsix
        path: /_built/**/*.vsix

  publish:
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    needs: build
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - name: Download Package artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ github.event.repository.name }}.vsix

      - name: Upload to Open VSIX
        shell: pwsh
        env:
          VSIX_FILE: ${{ github.event.repository.name }}.vsix
        run: |
          Add-Type -AssemblyName System.Web

          $repoUrl       = "$Env:GITHUB_SERVER_URL/$Env:GITHUB_REPOSITORY/"
          $repo          = [System.Web.HttpUtility]::UrlEncode($repoUrl)
          $issueTracker  = [System.Web.HttpUtility]::UrlEncode($repoUrl + "issues/")
          $readmeUrl     = [System.Web.HttpUtility]::UrlEncode("$Env:GITHUB_REF_NAME/README.md")

          $endpoint = "https://www.vsixgallery.com/api/upload"
          $url      = "$endpoint`?repo=$repo&issuetracker=$issueTracker&readmeUrl=$readmeUrl"

          if (-not (Test-Path $Env:VSIX_FILE)) {
            Write-Error "VSIX file not found: $Env:VSIX_FILE"
            exit 1
          }

          Write-Host "Uploading $Env:VSIX_FILE to $endpoint"

          try {
            $webclient = New-Object System.Net.WebClient
            $webclient.UploadFile($url, $Env:VSIX_FILE) | Out-Null
            Write-Host -ForegroundColor Green "OK"
          }
          catch {
            Write-Host -ForegroundColor Red "FAIL"
            $resp = $_.Exception.Response
            if ($resp) {
              Write-Host ("Status: {0} {1}" -f [int]$resp.StatusCode, $resp.StatusCode)
              $xerror = $resp.Headers["x-error"]
              if ($xerror) { Write-Host ("x-error: {0}" -f $xerror) }
              try {
                $reader = New-Object System.IO.StreamReader($resp.GetResponseStream())
                $body = $reader.ReadToEnd()
                if ($body) { Write-Host "Body:`n$body" }
              } catch { }
            }
            else {
              Write-Host $_.Exception.Message
              if ($_.Exception.InnerException) {
                Write-Host $_.Exception.InnerException.Message
              }
            }
            exit 1
          }

      - name: Publish extension to Marketplace
        if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]') }}
        uses: cezarypiatek/VsixPublisherAction@1.2
        with:
          extension-file: '${{ github.event.repository.name }}.vsix'
          publish-manifest-file: 'vs-publish.json'
          personal-access-code: ${{ secrets.VS_PUBLISHER_ACCESS_TOKEN }}

      - name: Tag and release
        if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]') }}
        id: tag_release
        uses: softprops/action-gh-release@v3
        with:
          body: release ${{ needs.build.outputs.version }}
          generate_release_notes: true
          tag_name: ${{ needs.build.outputs.version }}
          files: |
            **/*.vsix
